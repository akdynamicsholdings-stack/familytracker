const getDays=(y,m)=>new Date(y,m+1,0).getDate();
const getFirst=(y,m)=>new Date(y,m,1).getDay();
const getHabits=(kid)=>kid.sections.flatMap(s=>s.habits);

function App(){
const now=new Date();
const [view,setView]=useState(“home”);
const [kidId,setKidId]=useState(null);

const [year,setYear]=useState(now.getFullYear());
const [month,setMonth]=useState(now.getMonth());
const [checked,setChecked]=useState(()=>{
const saved=store.get(“fht-checked”);
return saved||{};
});

useEffect(()=>{ store.set(“fht-checked”,checked); },[checked]);

const hk=(kid,y,m,d,h)=>`${kid}_${y}_${m}_${d}_${h}`;
const toggle=(kid,d,h)=>{
const k=hk(kid,year,month,d,h);
setChecked(p=>({…p,[k]:!p[k]}));
};
const isDone=(kid,d,h)=>!!checked[hk(kid,year,month,d,h)];

const dayComp=(kidId,d)=>{
const kid=KIDS.find(k=>k.id===kidId);
const habits=getHabits(kid);
const done=habits.filter(h=>isDone(kidId,d,h.id)).length;
return{done,total:habits.length,pct:Math.round(done/habits.length*100)};
};
const monthComp=(kidId)=>{
const days=getDays(year,month);
const kid=KIDS.find(k=>k.id===kidId);
const habits=getHabits(kid);
let done=0,total=0;
for(let d=1;d<=days;d++) for(const h of habits){total++;if(isDone(kidId,d,h.id))done++;}
return{done,total,pct:total?Math.round(done/total*100):0};
};
const streak=(kidId)=>{
const isN=year===now.getFullYear()&&month===now.getMonth();
const start=isN?now.getDate():getDays(year,month);
let s=0;
for(let d=start;d>=1;d–){
const{done,total}=dayComp(kidId,d);
if(done===total&&total>0)s++;else break;
}
return s;
};
const prev=()=>month===0?(setYear(y=>y-1),setMonth(11)):setMonth(m=>m-1);
const next=()=>month===11?(setYear(y=>y+1),setMonth(0)):setMonth(m=>m+1);
